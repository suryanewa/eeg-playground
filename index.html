<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EEG Playground</title>
    <meta name="description" content="A playground for reviewing EEG logo explorations." />
    <meta property="og:title" content="EEG Playground" />
    <meta property="og:description" content="A playground for reviewing EEG logo explorations." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EEG Playground" />
    <meta property="og:image" content="/assets/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="A random arrangement of EEG logo explorations." />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EEG Playground" />
    <meta name="twitter:description" content="A playground for reviewing EEG logo explorations." />
    <meta name="twitter:image" content="/assets/og-image.png" />
    <meta name="twitter:image:alt" content="A random arrangement of EEG logo explorations." />
    <link id="favicon" rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg'/%3E" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shader-layer" id="shader-layer" aria-hidden="true"></div>
    <main class="logo-sheet" aria-label="EEG branding explorations">
      <section class="logo-upload" id="logo-upload" data-empty="true" aria-label="Upload logos">
        <input id="logo-file-input" type="file" accept=".svg,image/svg+xml" multiple hidden />
        <input id="type-file-input" type="file" accept=".woff,.woff2,.ttf,.otf,font/woff,font/woff2,font/ttf,font/otf" multiple hidden />
        <nav class="brand-tabs" aria-label="Brand asset categories">
          <button class="brand-tab" type="button" aria-pressed="true" tabindex="0">Colors</button>
          <button class="brand-tab" type="button" aria-pressed="false" tabindex="-1">Logos</button>
          <button class="brand-tab" type="button" aria-pressed="false" tabindex="-1">Type</button>
          <button class="brand-tab" type="button" aria-pressed="false" tabindex="-1">Lockups</button>
          <button class="brand-tab" type="button" aria-pressed="false" tabindex="-1">Artifacts</button>
        </nav>
        <div class="logo-upload-empty" id="logo-upload-empty" hidden>
          <div class="upload-copy">
            <p>Drop SVG logos here, or <button class="placeholder-link" id="placeholder-button" type="button">use placeholders instead</button>.</p>
          </div>
          <button class="upload-button" id="logo-file-button" type="button" aria-label="Choose SVG files">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 19V5M6 11l6-6 6 6"/>
            </svg>
          </button>
          <p class="upload-feedback" id="upload-feedback" role="status" aria-live="polite"></p>
        </div>
        <div class="logo-upload-empty" id="type-upload-empty" hidden>
          <div class="upload-copy">
            <p>Drop font files here, or <button class="placeholder-link" id="type-explore-button" type="button">explore ours</button>.</p>
          </div>
          <button class="upload-button" id="type-file-button" type="button" aria-label="Choose font files">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 19V5M6 11l6-6 6 6"/>
            </svg>
          </button>
          <p class="upload-feedback" id="type-upload-feedback" role="status" aria-live="polite"></p>
        </div>
      </section>
      <section class="logo-grid" id="logo-grid" aria-label="Individual EEG logo SVGs"></section>
      <section class="type-grid" id="type-grid" aria-label="Open-source typeface specimens" hidden></section>
      <section class="color-grid" id="color-grid" aria-label="Color combinations" hidden></section>
      <section class="lockup-grid" id="lockup-grid" aria-label="Logo and type lockups" hidden></section>
    </main>
    <div class="drop-overlay" id="drop-overlay" hidden aria-hidden="true">
      <div class="drop-overlay-frame">
        <span class="drop-overlay-plus">＋</span>
        <p id="drop-overlay-title">Drop to add logos</p>
        <span id="drop-overlay-hint">SVG files only</span>
      </div>
    </div>
    <dialog class="logo-dialog" id="logo-dialog" aria-label="Selected logo preview" tabindex="-1">
      <button class="close-button" type="button" aria-label="Close fullscreen logo">
        <span aria-hidden="true"></span>
      </button>
      <button class="nav-button nav-button--previous" type="button" aria-label="Previous logo">
        <span aria-hidden="true"></span>
      </button>
      <div class="fullscreen-logo" id="fullscreen-logo" role="img" aria-label=""></div>
      <button class="nav-button nav-button--next" type="button" aria-label="Next logo">
        <span aria-hidden="true"></span>
      </button>
    </dialog>
    <script src="dist/env.js"></script>
    <script src="dist/app.js"></script>
  </body>
</html>
