<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>EEG Branding Explorations</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="shader-layer" id="shader-layer" aria-hidden="true"></div>
    <main class="logo-sheet" aria-label="EEG branding explorations">
      <section class="logo-grid" id="logo-grid" aria-label="Individual EEG logo SVGs"></section>
    </main>
    <nav class="utility-dock" aria-label="Utility controls">
      <div class="settings-popover" id="settings-popover" hidden>
        <label class="settings-toggle">
          <span>Gradients</span>
          <input id="settings-gradient" type="checkbox" />
        </label>
        <div class="settings-field settings-field--font">
          <span class="settings-field-title">Font</span>
          <div class="font-picker" id="settings-font-picker">
            <button class="font-picker-button" id="settings-font-button" type="button" aria-haspopup="listbox" aria-expanded="false" aria-controls="settings-font-options">Helvetica</button>
            <div class="font-picker-options" id="settings-font-options" role="listbox" aria-label="Font" hidden>
              <button class="font-picker-option" type="button" role="option" aria-selected="true" data-font="Helvetica">Helvetica</button>
              <button class="font-picker-option" type="button" role="option" aria-selected="false" data-font="Inter">Inter</button>
              <button class="font-picker-option" type="button" role="option" aria-selected="false" data-font="Inter Tight">Inter Tight</button>
              <button class="font-picker-option" type="button" role="option" aria-selected="false" data-font="Open Runde">Open Runde</button>
              <button class="font-picker-option" type="button" role="option" aria-selected="false" data-font="Vercel Geist">Vercel Geist</button>
              <button class="font-picker-option" type="button" role="option" aria-selected="false" data-font="Gotham">Gotham</button>
              <button class="font-picker-option" type="button" role="option" aria-selected="false" data-font="SF Pro">SF Pro</button>
              <button class="font-picker-option" type="button" role="option" aria-selected="false" data-font="Google Sans">Google Sans</button>
              <button class="font-picker-option" type="button" role="option" aria-selected="false" data-font="Manrope">Manrope</button>
              <button class="font-picker-option" type="button" role="option" aria-selected="false" data-font="Satoshi">Satoshi</button>
            </div>
          </div>
        </div>
      </div>
      <button class="utility-button utility-button--shuffle" id="shuffle-button" type="button" aria-label="Shuffle logos">
        <svg viewBox="-8 -8 528 528" aria-hidden="true">

        </svg>
      </button>
      <button class="utility-button" type="button" aria-label="Info">

      </button>
      <button class="utility-button" id="settings-button" type="button" aria-label="Settings" aria-expanded="false" aria-controls="settings-popover">

          <path d="M21.62 10.52l-2.05-.68a7.7 7.7 0 0 0-.52-1.25l.98-1.93a.9.9 0 0 0-.16-1.04l-1.49-1.49a.9.9 0 0 0-1.04-.16l-1.93.98c-.4-.21-.82-.38-1.25-.52l-.68-2.05A.9.9 0 0 0 12.63 2h-2.1a.9.9 0 0 0-.85.62L9 4.67c-.43.14-.85.31-1.25.52l-1.93-.98a.9.9 0 0 0-1.04.16L3.29 5.86a.9.9 0 0 0-.16 1.04l.98 1.93c-.21.4-.38.82-.52 1.25l-2.05.68a.9.9 0 0 0-.62.85v2.1c0 .39.25.74.62.85l2.05.68c.14.43.31.85.52 1.25l-.98 1.93a.9.9 0 0 0 .16 1.04l1.49 1.49c.28.28.69.34 1.04.16l1.93-.98c.4.21.82.38 1.25.52l.68 2.05c.11.37.46.62.85.62h2.1c.39 0 .74-.25.85-.62l.68-2.05c.43-.14.85-.31 1.25-.52l1.93.98c.35.18.76.12 1.04-.16l1.49-1.49a.9.9 0 0 0 .16-1.04l-.98-1.93c.21-.4.38-.82.52-1.25l2.05-.68c.37-.11.62-.46.62-.85v-2.1a.9.9 0 0 0-.62-.85ZM11.58 15.65a3.15 3.15 0 1 1 0-6.3 3.15 3.15 0 0 1 0 6.3Z"/>
        </svg>
      </button>
    </nav>
    <dialog class="logo-dialog" id="logo-dialog" aria-label="Selected logo preview" tabindex="-1">
      <button class="close-button" type="button" aria-label="Close fullscreen logo">
        <span aria-hidden="true"></span>
      </button>
      <button class="nav-button nav-button--previous" type="button" aria-label="Previous logo">
        <span aria-hidden="true"></span>
      </button>
      <div class="fullscreen-logo" id="fullscreen-logo" role="img" aria-label=""></div>
      <button class="nav-button nav-button--next" type="button" aria-label="Next logo">
        <span aria-hidden="true"></span>
      </button>
    </dialog>
    <script src="logos-data.js"></script>
    <script src="dist/app.js"></script>
  </body>
</html>
