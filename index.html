  <body>
    <div class="shader-layer" id="shader-layer" aria-hidden="true"></div>
    <div class="brand-mark" id="brand-mark" aria-label="Brandy">
      <div class="brand-mark-lockup">
        <span class="brand-mark-icon" aria-hidden="true">
          <span class="brand-mark-art">

              <path fill="currentColor" fill-rule="evenodd" d="M391.8,734c1.4,31.3-9.8,51.5-33.2,61-13.7,5.4-22.2,5-36.5,5H77.9c-14.3,0-22.8.4-36.5-5-23.5-9.4-34.7-29.6-33.2-61C-4.4,392.9-.9,346.7,8.2,305.9c13.1-58.5,35.4-73.8,44.3-80.2,24.9-17.9,53.7-19.7,68.3-45.1,7.6-13.3,7.9-27,7.1-36.3V8.3c0-4.6,4-8.3,8.9-8.3h126.4c4.9,0,8.9,3.7,8.9,8.3v136c-.8,9.3-.5,23.1,7.1,36.3,14.6,25.5,43.3,27.2,68.3,45.1,9,6.5,31.3,21.7,44.3,80.2,9.1,40.7,12.6,87,0,428.1Z"/>
            </svg>

        <span class="brand-mark-wordmark" aria-hidden="true">

      </div>
    </div>
    <nav class="grid-filters" id="grid-filters" aria-label="Grid filters" hidden>
      <div class="grid-filter-panel" data-grid-filter-tab="Colors">
        <button class="grid-filter" type="button" data-filter="all" aria-pressed="true">All</button>
        <button class="grid-filter" type="button" data-filter="locked" aria-pressed="false">Locked</button>
      </div>
      <div class="grid-filter-panel" data-grid-filter-tab="Logos">
        <button class="grid-filter" type="button" data-filter="all" aria-pressed="true">All</button>
        <button class="grid-filter" type="button" data-filter="locked" aria-pressed="false">Locked</button>
      </div>
      <div class="grid-filter-panel" data-grid-filter-tab="Type">
        <button class="grid-filter" type="button" data-filter="all" aria-pressed="true">All</button>
        <button class="grid-filter" type="button" data-filter="locked" aria-pressed="false">Locked</button>
        <button class="grid-filter" type="button" data-filter="editors-picks" aria-pressed="false">Picks</button>
      </div>
      <div class="grid-filter-panel" data-grid-filter-tab="Lockups">
        <button class="grid-filter" type="button" data-filter="all" aria-pressed="true">All</button>
        <button class="grid-filter" type="button" data-filter="locked" aria-pressed="false">Locked</button>
      </div>
    </nav>
    <nav class="grid-actions" id="grid-actions" aria-label="Grid actions" hidden>
      <div class="grid-action-panel" data-tab="Colors">
        <div class="grid-action-group">
          <button class="grid-action" type="button" data-action="clear-locked">Clear locked (⌘ L)</button>
          <button class="grid-action" type="button" data-action="toggle-bw" aria-pressed="false">Black & White (B)</button>
        </div>
        <div class="grid-action-group">
          <button class="grid-action" type="button" data-action="import">Import<span class="grid-action-arrow" aria-hidden="true">↑</span> (⌘ O)</button>
          <button class="grid-action" type="button" data-action="export">Export<span class="grid-action-arrow" aria-hidden="true">↓</span> (⌘ S)</button>
          <button class="grid-action grid-action--scroll-up" type="button" data-action="scroll-up" hidden>Scroll Up<span class="grid-action-arrow" aria-hidden="true">↑</span></button>
        </div>
      </div>
      <div class="grid-action-panel" data-tab="Logos">
        <div class="grid-action-group">
          <button class="grid-action" type="button" data-action="clear-locked">Clear locked (⌘ L)</button>
          <button class="grid-action" type="button" data-action="toggle-bw" aria-pressed="false">Black & White (B)</button>
          <button class="grid-action" type="button" data-action="cycle-shader" aria-pressed="false">Shaders (S)</button>
          <button class="grid-action grid-action--reset" type="button" data-action="reset-deletions" hidden>Reset</button>
        </div>
        <div class="grid-action-group">
          <button class="grid-action" type="button" data-action="import">Import<span class="grid-action-arrow" aria-hidden="true">↑</span> (⌘ O)</button>
          <button class="grid-action" type="button" data-action="export">Export<span class="grid-action-arrow" aria-hidden="true">↓</span> (⌘ S)</button>
          <button class="grid-action grid-action--scroll-up" type="button" data-action="scroll-up" hidden>Scroll Up<span class="grid-action-arrow" aria-hidden="true">↑</span></button>
        </div>
      </div>
      <div class="grid-action-panel" data-tab="Type">
        <div class="grid-action-group">
          <button class="grid-action" type="button" data-action="clear-locked">Clear locked (⌘ L)</button>
          <button class="grid-action" type="button" data-action="toggle-bw" aria-pressed="false">Black & White (B)</button>
          <button class="grid-action" type="button" data-action="cycle-shader" aria-pressed="false">Shaders (S)</button>
          <button class="grid-action grid-action--reset" type="button" data-action="reset-deletions" hidden>Reset</button>
        </div>
        <div class="grid-action-group">
          <button class="grid-action" type="button" data-action="import">Import<span class="grid-action-arrow" aria-hidden="true">↑</span> (⌘ O)</button>
          <button class="grid-action" type="button" data-action="export">Export<span class="grid-action-arrow" aria-hidden="true">↓</span> (⌘ S)</button>
          <button class="grid-action grid-action--scroll-up" type="button" data-action="scroll-up" hidden>Scroll Up<span class="grid-action-arrow" aria-hidden="true">↑</span></button>
        </div>
      </div>
      <div class="grid-action-panel" data-tab="Lockups">
        <div class="grid-action-group">
          <button class="grid-action" type="button" data-action="clear-locked">Clear locked (⌘ L)</button>
          <button class="grid-action" type="button" data-action="toggle-bw" aria-pressed="false">Black & White (B)</button>
          <button class="grid-action" type="button" data-action="cycle-shader" aria-pressed="false">Shaders (S)</button>
          <button class="grid-action grid-action--reset" type="button" data-action="reset-deletions" hidden>Reset</button>
        </div>
        <div class="grid-action-group">
          <button class="grid-action" type="button" data-action="import">Import<span class="grid-action-arrow" aria-hidden="true">↑</span> (⌘ O)</button>
          <button class="grid-action" type="button" data-action="export">Export<span class="grid-action-arrow" aria-hidden="true">↓</span> (⌘ S)</button>
          <button class="grid-action grid-action--scroll-up" type="button" data-action="scroll-up" hidden>Scroll Up<span class="grid-action-arrow" aria-hidden="true">↑</span></button>
        </div>
      </div>
    </nav>
    <main class="logo-sheet" aria-label="EEG branding explorations">
      <section class="logo-upload" id="logo-upload" data-empty="true" aria-label="Upload logos">
        <input id="logo-file-input" type="file" accept=".svg,image/svg+xml" multiple hidden />
        <input id="type-file-input" type="file" accept=".woff,.woff2,.ttf,.otf,font/woff,font/woff2,font/ttf,font/otf" multiple hidden />
        <input id="locked-import-input" type="file" accept=".json,application/json,.svg,image/svg+xml,.woff,.woff2,.ttf,.otf,font/woff,font/woff2,font/ttf,font/otf" multiple hidden />
        <nav class="brand-tabs" aria-label="Brand asset categories">
          <button class="brand-tab" type="button" aria-pressed="true" tabindex="0">Colors</button>
          <button class="brand-tab" type="button" aria-pressed="false" tabindex="-1">Logos</button>
          <button class="brand-tab" type="button" aria-pressed="false" tabindex="-1">Type</button>
          <button class="brand-tab" type="button" aria-pressed="false" tabindex="-1">Lockups</button>
          <button class="brand-tab brand-tab--soon" type="button" aria-pressed="false" aria-disabled="true" tabindex="-1" data-brand-tab="Artifacts">Artifacts</button>
        </nav>
        <div class="logo-upload-empty" id="logo-upload-empty" hidden tabindex="0" aria-label="Upload logo SVGs">
          <svg class="upload-border" aria-hidden="true"><rect x="1" y="1" rx="0" ry="0" fill="none" /></svg>
          <div class="upload-copy">
            <p>Drop logo SVGs here, or <button class="placeholder-link" id="placeholder-button" type="button">use placeholders instead</button>.</p>
          </div>
          <span class="upload-button" id="logo-file-button" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 19V5M6 11l6-6 6 6"/>
            </svg>
          </span>
          <p class="upload-feedback" id="upload-feedback" role="status" aria-live="polite"></p>
        </div>
        <div class="logo-upload-empty" id="type-upload-empty" hidden tabindex="0" aria-label="Upload font files">
          <svg class="upload-border" aria-hidden="true"><rect x="1" y="1" rx="0" ry="0" fill="none" /></svg>
          <div class="upload-copy">
            <p>Drop font files here, or <button class="placeholder-link" id="type-explore-button" type="button">explore ours</button>.</p>
          </div>
          <span class="upload-button" id="type-file-button" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 19V5M6 11l6-6 6 6"/>
            </svg>
          </span>
          <p class="upload-feedback" id="type-upload-feedback" role="status" aria-live="polite"></p>
        </div>
        <div class="logo-upload-empty" id="lockup-upload-empty" hidden tabindex="0" aria-label="Upload logos or typefaces">
          <svg class="upload-border" aria-hidden="true"><rect x="1" y="1" rx="0" ry="0" fill="none" /></svg>
          <div class="upload-copy">
            <p>You haven't uploaded any logos or typefaces.<br>Add them on the <button class="brand-tab-link" type="button" data-brand-tab="Logos">Logos</button> or <button class="brand-tab-link" type="button" data-brand-tab="Type">Type</button> tabs or <button class="placeholder-link" id="lockup-try-button" type="button">try ours</button>.</p>
          </div>
          <span class="upload-button" id="lockup-file-button" aria-hidden="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 19V5M6 11l6-6 6 6"/>
            </svg>
          </span>
        </div>
        <div class="logo-upload-empty import-drag-target" id="import-drag-target" hidden tabindex="-1" aria-hidden="true">
          <svg class="upload-border" aria-hidden="true"><rect x="1" y="1" rx="0" ry="0" fill="none" /></svg>
          <div class="upload-copy">
            <p>Drop to import SVG, font, or Brandy JSON files.</p>
          </div>
        </div>
      </section>
      <section class="logo-grid" id="logo-grid" aria-label="Individual EEG logo SVGs"></section>
      <section class="type-grid" id="type-grid" aria-label="Open-source typeface specimens" hidden></section>
      <section class="color-grid" id="color-grid" aria-label="Color combinations" hidden></section>
      <section class="lockup-grid" id="lockup-grid" aria-label="Logo and type lockups" hidden></section>
    </main>
    <dialog class="logo-dialog" id="logo-dialog" aria-label="Selected logo preview" tabindex="-1">
      <button class="close-button" type="button" aria-label="Close fullscreen logo">
        <span aria-hidden="true"></span>
      </button>
      <button class="nav-button nav-button--previous" type="button" aria-label="Previous logo">
        <span aria-hidden="true"></span>
      </button>
      <div class="fullscreen-logo" id="fullscreen-logo" role="img" aria-label=""></div>
      <button class="nav-button nav-button--next" type="button" aria-label="Next logo">
        <span aria-hidden="true"></span>
      </button>
    </dialog>
    <script>
      (function () {
        function estimateGutterWidth() {
          var grid = document.querySelector(
            ".color-grid:not([hidden]), #logo-grid:not([hidden]), #type-grid:not([hidden]), #lockup-grid:not([hidden])",
          );
          if (grid) return Math.max(0, grid.getBoundingClientRect().left);

          var sheet = document.querySelector(".logo-sheet");
          if (!sheet) return 0;
          var sheetRect = sheet.getBoundingClientRect();
          var padLeft = Number.parseFloat(getComputedStyle(sheet).paddingLeft) || 20;
          return Math.max(0, sheetRect.left + padLeft);
        }

        function syncBrandMarkPositionEarly() {
          var brandMark = document.getElementById("brand-mark");
          var uploadPanel = document.getElementById("logo-upload");
          if (!brandMark || !uploadPanel) return;

          var brandTabs = uploadPanel.querySelector(".brand-tabs");
          var lockup = brandMark.querySelector(".brand-mark-lockup");
          var gutterWidth = estimateGutterWidth();
          var lockupWidth = lockup
            ? lockup.getBoundingClientRect().width
            : brandMark.getBoundingClientRect().width;
          var minInset = Math.min(Math.max(window.innerWidth * 0.015, 10), 18);
          var gutterCenter = gutterWidth / 2;
          var top = minInset;

          if (brandTabs) {
            var rect = brandTabs.getBoundingClientRect();
            if (rect.height) top = rect.top + rect.height / 2 + window.scrollY;
          }

          brandMark.style.top = `${top}px`;

          if (gutterWidth >= lockupWidth + minInset * 2) {
            brandMark.style.left = `${gutterCenter}px`;
            brandMark.style.transform = "translate(-50%, -50%)";
          } else {
            brandMark.style.left = `${minInset}px`;
            brandMark.style.transform = "translateY(-50%)";
          }

          brandMark.classList.add("is-positioned");
        }

        syncBrandMarkPositionEarly();
      })();
    </script>
    <script src="dist/env.js"></script>
    <script src="dist/app.js"></script>
  </body>
</html>
